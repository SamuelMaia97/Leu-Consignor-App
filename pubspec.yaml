name: leu_consignor_app
description: Leu Numismatik consignor / contract app.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  go_router: ^17.2.1
  intl: ^0.20.2
  dio: ^5.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  image_picker: ^1.2.1
  camera: ^0.12.0+1
  camera_windows: ^0.2.6+4
  pdf: ^3.12.0
  printing: ^5.14.3
  open_filex: ^4.7.0
  flutter_secure_storage: ^10.0.0
  collection: ^1.19.1
  crypto: ^3.0.6
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo-without-text.png
    - assets/images/logo-color.png
    - assets/images/logo-blue.jpg
    - assets/data/countries.json
    - assets/data/phone_prefixes.json
    - assets/signatures/signature_lars_rutten.jpg
    - assets/signatures/signature_yves_gunzenreiner.png
msix_config:
  display_name: Leu Consignor App
  publisher_display_name: Leu Numismatik AG
  identity_name: LeuNumismatik.ConsignorApp
  publisher: "CN=Leu Numismatik AG, O=Leu Numismatik AG, C=CH"
  msix_version: 1.0.0.2
  logo_path: assets/images/logo-without-text.png
  capabilities: internetClient, webcam
  output_path: build/windows/installer
  output_name: LeuConsignorApp
  certificate_path: certs/LeuConsignorAppTestCert.pfx
  certificate_password: "LeuTestCert123!"
  install_certificate: false